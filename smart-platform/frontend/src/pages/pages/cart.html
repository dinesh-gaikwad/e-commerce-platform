<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
</head>
<body>

<h1>🛒 My Cart</h1>

<div id="cart"></div>

<script>
fetch("http://localhost:5000/api/cart", {
  headers: {
    Authorization: "Bearer " + localStorage.getItem("token")
  }
})
.then(res => res.json())
.then(data => {
  document.getElementById("cart").innerHTML =
    data.cart.items.map(i => `
      <div>
        <h3>${i.name}</h3>
        <p>Qty: ${i.quantity}</p>
        <p>₹${i.price}</p>
      </div>
    `).join("");
});
</script>

</body>
</html>
