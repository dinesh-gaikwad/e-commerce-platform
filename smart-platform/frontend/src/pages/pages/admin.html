<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
}

header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 250px 1fr;
  height: 100vh;
}

.sidebar {
  background: #111827;
  padding: 20px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #1f2937;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.sidebar button:hover {
  background: #374151;
}

.main {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 10px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.stat-box {
  background: #111827;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}
</style>
</head>

<body>

<header>👑 Admin Dashboard</header>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <button onclick="loadDashboard()">📊 Dashboard</button>
    <button onclick="loadProducts()">📦 Products</button>
    <button onclick="loadOrders()">🛒 Orders</button>
    <button onclick="loadUsers()">👤 Users</button>
  </div>

  <!-- Main -->
  <div class="main" id="main">

    <h2>Welcome Admin 🚀</h2>

    <div class="stats">
      <div class="stat-box">
        <h3 id="users">0</h3>
        <p>Users</p>
      </div>

      <div class="stat-box">
        <h3 id="products">0</h3>
        <p>Products</p>
      </div>

      <div class="stat-box">
        <h3 id="orders">0</h3>
        <p>Orders</p>
      </div>
    </div>

  </div>

</div>

<script>
// ===============================
// 🔗 API BASE URL
// ===============================
const API = "http://localhost:5000/api/admin";


// ===============================
// 📊 LOAD DASHBOARD
// ===============================
async function loadDashboard() {
  const res = await fetch(`${API}/dashboard`);
  const data = await res.json();

  document.getElementById("users").innerText = data.stats.users;
  document.getElementById("products").innerText = data.stats.products;
  document.getElementById("orders").innerText = data.stats.orders;
}


// ===============================
// 📦 PRODUCTS
// ===============================
async function loadProducts() {
  const res = await fetch(`${API}/products`);
  const data = await res.json();

  document.getElementById("main").innerHTML = `
    <h2>📦 Products</h2>
    ${data.products.map(p => `
      <div class="card">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
      </div>
    `).join("")}
  `;
}


// ===============================
// 🛒 ORDERS
// ===============================
async function loadOrders() {
  const res = await fetch(`${API}/orders`);
  const data = await res.json();

  document.getElementById("main").innerHTML = `
    <h2>🛒 Orders</h2>
    ${data.orders.map(o => `
      <div class="card">
        <p>Order ID: ${o._id}</p>
        <p>Status: ${o.status}</p>
        <p>Total: ₹${o.total}</p>
      </div>
    `).join("")}
  `;
}


// ===============================
// 👤 USERS
// ===============================
async function loadUsers() {
  const res = await fetch(`${API}/users`);
  const data = await res.json();

  document.getElementById("main").innerHTML = `
    <h2>👤 Users</h2>
    ${data.users.map(u => `
      <div class="card">
        <p>Name: ${u.name}</p>
        <p>Email: ${u.email}</p>
      </div>
    `).join("")}
  `;
}


// default load
loadDashboard();
</script>

</body>
</html>
